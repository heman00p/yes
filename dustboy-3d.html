<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dustboy 3D Matrix</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #050505; color: #00f3ff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; cursor: crosshair; }
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        h1 { margin: 0; font-size: 1.5rem; text-shadow: 0 0 10px #00f3ff; }
        .status { margin-top: 10px; padding: 5px 10px; border: 1px solid #00f3ff; display: inline-block; background: rgba(0, 243, 255, 0.1); }
        .status.danger { border-color: #ff003c; color: #ff003c; background: rgba(255, 0, 60, 0.1); text-shadow: 0 0 10px #ff003c; }
        
        #tooltip {
            position: absolute;
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid #bc13fe;
            padding: 15px;
            border-radius: 5px;
            color: #fff;
            display: none;
            pointer-events: none;
            transform: translate(-50%, -100%);
            margin-top: -15px;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
            z-index: 20;
            min-width: 150px;
        }
        #tooltip h3 { margin: 0 0 10px 0; color: #00f3ff; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        #tooltip p { margin: 5px 0; font-size: 0.9rem; }
        .val-pm25 { color: #facc15; font-weight: bold; }
        .val-temp { color: #ff6b6b; font-weight: bold; }
        .val-humid { color: #48dbfb; font-weight: bold; }
        
        #instructions {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.5); font-size: 0.8rem; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1>🛰️ DUSTBOY 3D MATRIX</h1>
    <div id="status-indicator" class="status">LINK ESTABLISHING...</div>
</div>

<div id="tooltip">
    <h3 id="tt-id">STATION</h3>
    <p>PM2.5: <span id="tt-pm" class="val-pm25">0</span> µg/m³</p>
    <p>TEMP: <span id="tt-temp" class="val-temp">0</span> °C</p>
    <p>HUMID: <span id="tt-humid" class="val-humid">0</span> %</p>
</div>

<div id="instructions">ROTATE: Left Click | PAN: Right Click | ZOOM: Scroll | HOVER to view data</div>

<div id="canvas-container"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 3D Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    scene.fog = new THREE.FogExp2(0x020205, 0.015);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(30, 20, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const pointLight = new THREE.PointLight(0x00f3ff, 2, 100);
    pointLight.position.set(0, 30, 0);
    scene.add(pointLight);

    // Cyber Grid
    const gridHelper = new THREE.GridHelper(100, 50, 0xbc13fe, 0x003344);
    gridHelper.position.y = -0.1;
    scene.add(gridHelper);

    // Core central structure (just for looks)
    const coreGeo = new THREE.CylinderGeometry(1, 2, 2, 8);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, wireframe: true });
    const core = new THREE.Mesh(coreGeo, coreMat);
    scene.add(core);

    // --- Data Logic ---
    const stations = new Map(); // id -> Mesh group
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredObject = null;

    const tooltip = document.getElementById('tooltip');
    const statusEl = document.getElementById('status-indicator');

    function getAQIColor(pm25) {
        if (pm25 <= 15) return 0x00ff66; // Good (Green)
        if (pm25 <= 25) return 0xfacc15; // Moderate (Yellow)
        if (pm25 <= 37.5) return 0xfb923c; // Unhealthy (Orange)
        return 0xff003c; // Dangerous (Red)
    }

    function createStationTower(id) {
        const group = new THREE.Group();
        
        // Base
        const baseGeo = new THREE.BoxGeometry(2, 0.5, 2);
        const baseMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        group.add(base);

        // Bar (Height based on PM2.5)
        const barGeo = new THREE.BoxGeometry(1, 1, 1);
        // Translate geometry so it scales up from the bottom
        barGeo.translate(0, 0.5, 0); 
        const barMat = new THREE.MeshPhongMaterial({ 
            color: 0x00ff66,
            emissive: 0x002200,
            transparent: true,
            opacity: 0.8
        });
        const bar = new THREE.Mesh(barGeo, barMat);
        bar.position.y = 0.25;
        bar.name = 'data-bar';
        bar.userData = { id: id }; // Store ID for raycasting
        group.add(bar);

        // Position randomly on grid for now (until we have GPS coords)
        const angle = Math.random() * Math.PI * 2;
        const radius = 10 + Math.random() * 30;
        group.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);

        scene.add(group);
        return { group, bar };
    }

    function updateStation(id, data) {
        console.log(`Station ${id} data:`, data); // Debugging
        let pm25 = null, temp = null, humid = null;
        
        // Robust Key Matching
        for (const [key, value] of Object.entries(data)) {
            const k = key.toLowerCase();
            const val = parseFloat(value);
            if (isNaN(val)) continue;

            // PM2.5: pm25, pm2_5, pm2, dust, etc.
            if (k === 'pm25' || k === 'pm2_5' || k === 'pm2.5' || (k.includes('pm2') && !k.includes('pm25_'))) {
                pm25 = val;
            }
            // Temp: temp, tc, temperature, t, temp_c
            else if (k.includes('temp') || k === 'tc' || k === 't') {
                temp = val;
            }
            // Humid: humid, hm, humidity, h, humid_pct
            else if (k.includes('humid') || k === 'hm' || k === 'h') {
                humid = val;
            }
        }

        if (!stations.has(id)) {
            stations.set(id, createStationTower(id));
        }

        const tower = stations.get(id);
        const displayPm25 = pm25 !== null ? pm25 : 0;
        const targetHeight = Math.max(1, displayPm25 / 2);
        const color = getAQIColor(displayPm25);

        // Update 3D Object
        tower.bar.scale.y = targetHeight;
        tower.bar.material.color.setHex(color);
        tower.bar.material.emissive.setHex(color);
        tower.bar.material.emissiveIntensity = displayPm25 > 37.5 ? 0.8 : 0.4;
        
        // Save raw data for tooltip
        tower.bar.userData.pm25 = pm25 !== null ? pm25 : 'N/A';
        tower.bar.userData.temp = temp !== null ? temp : 'N/A';
        tower.bar.userData.humid = humid !== null ? humid : 'N/A';

        checkGlobalStatus();
    }

    function checkGlobalStatus() {
        let isCritical = false;
        stations.forEach(tower => {
            if (tower.bar.userData.pm25 > 37.5) isCritical = true;
        });

        if (isCritical) {
            statusEl.innerText = 'CRITICAL ALERT';
            statusEl.className = 'status danger';
            scene.fog.color.setHex(0x330005); // Reddish fog
        } else {
            statusEl.innerText = 'SYSTEM ONLINE';
            statusEl.className = 'status';
            scene.fog.color.setHex(0x020205); // Normal fog
        }
    }

    // --- MQTT Setup ---
    const brokerUrl = 'wss://dustboy-wss-bridge.laris.workers.dev/mqtt';
    const topic = 'DUSTBOY/+/+/+/status';
    const client = mqtt.connect(brokerUrl);

    client.on('connect', () => {
        statusEl.innerText = 'SYSTEM ONLINE';
        client.subscribe(topic);
    });

    client.on('message', (topic, message) => {
        const rawMessage = message.toString();
        // Skip non-JSON messages like "offline"
        if (rawMessage === 'offline' || rawMessage === 'online') return;

        try {
            const payload = JSON.parse(rawMessage);
            const topicParts = topic.split('/');
            const stationId = topicParts[topicParts.length - 2]; 
            updateStation(stationId, payload);
        } catch (e) {
            // Ignore parse errors for non-data messages
            console.warn(`Skipping non-JSON or invalid message from ${topic}:`, rawMessage);
        }
    });

    client.on('error', () => {
        statusEl.innerText = 'LINK LOST';
        statusEl.className = 'status danger';
    });

    // --- Interaction ---
    window.addEventListener('mousemove', (event) => {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        tooltip.style.left = event.clientX + 'px';
        tooltip.style.top = event.clientY + 'px';
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Animation Loop ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        
        const delta = clock.getDelta();
        core.rotation.y += delta * 0.5;

        controls.update();

        // Raycasting for Tooltip
        raycaster.setFromCamera(mouse, camera);
        
        // Gather all bars
        const bars = Array.from(stations.values()).map(t => t.bar);
        const intersects = raycaster.intersectObjects(bars);

        if (intersects.length > 0) {
            const object = intersects[0].object;
            if (hoveredObject !== object) {
                if (hoveredObject) hoveredObject.material.wireframe = false;
                hoveredObject = object;
                hoveredObject.material.wireframe = true; // Highlight effect
                
                // Update Tooltip
                document.getElementById('tt-id').innerText = '#' + hoveredObject.userData.id;
                document.getElementById('tt-pm').innerText = hoveredObject.userData.pm25;
                document.getElementById('tt-temp').innerText = hoveredObject.userData.temp;
                document.getElementById('tt-humid').innerText = hoveredObject.userData.humid;
                tooltip.style.display = 'block';
            }
        } else {
            if (hoveredObject) {
                hoveredObject.material.wireframe = false;
                hoveredObject = null;
                tooltip.style.display = 'none';
            }
        }

        renderer.render(scene, camera);
    }

    animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Sensor Data - FloodBoy</title>
    <script src="https://cdn.jsdelivr.net/npm/viem@2.x/dist/viem.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/lib/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3B82F6;
            --success: #10B981;
            --bg-gray: #F9FAFB;
            --border: #E5E7EB;
            --text-main: #111827;
            --text-muted: #6B7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 32px;
            overflow: hidden;
        }

        .header {
            margin-bottom: 24px;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title-section h2 {
            margin: 0;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nickname {
            margin: 4px 0;
            font-size: 28px;
            font-weight: 700;
        }

        .description {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 16px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #ECFDF5;
            color: #065F46;
            padding: 4px 12px;
            border-radius: 9999px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
        }

        .address-link {
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .chart-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .toggle-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }

        .toggle-btn.active.water {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .toggle-btn.active.voltage {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .chart-container {
            height: 400px;
            width: 100%;
            margin-bottom: 32px;
            position: relative;
        }

        .table-container {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: var(--bg-gray);
            padding: 12px 16px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px;
            font-size: 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) {
            background: var(--bg-gray);
        }

        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            color: #EF4444;
            padding: 16px;
            background: #FEF2F2;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }

        @media (max-width: 640px) {
            .card { padding: 16px; }
            .chart-container { height: 300px; }
            .meta-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="errorBox" class="error-msg"></div>
    
    <div class="card">
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
        </div>

        <div class="header">
            <div class="title-section">
                <h2>Latest Sensor Data</h2>
                <h1 id="storeNickname" class="nickname">Loading...</h1>
                <p id="storeDescription" class="description">Fetching metadata from JIBCHAIN...</p>
            </div>
            
            <div class="meta-grid">
                <div class="meta-item">
                    <span class="status-badge">
                        <span class="status-dot"></span>
                        <span id="currentBlock">Current Block: ...</span>
                    </span>
                </div>
                <div class="meta-item">
                    <i data-lucide="clock" size="16"></i>
                    <span id="lastUpdated">Last Updated: ...</span>
                </div>
                <div class="meta-item">
                    <i data-lucide="hash" size="16"></i>
                    <a id="storeAddressLink" href="#" target="_blank" class="address-link">
                        <span id="storeAddressTrunc">0x...</span>
                        <i data-lucide="external-link" size="14"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="chart-controls">
            <button id="toggleWater" class="toggle-btn active water">Water Depth</button>
            <button id="toggleVoltage" class="toggle-btn voltage">Battery Voltage</button>
        </div>

        <div class="chart-container">
            <canvas id="sensorChart"></canvas>
            <div id="noDataChart" style="display:none; position:absolute; inset:0; display:flex; justify-content:center; align-items:center; color:var(--text-muted);">
                No historical data available
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Metric</th>
                        <th>Current</th>
                        <th>Min</th>
                        <th>Max</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr><td colspan="4" style="text-align:center;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <div>
                <strong>Store Owner:</strong><br>
                <a id="ownerLink" href="#" target="_blank" class="address-link">
                    <span id="ownerTrunc">0x...</span>
                    <i data-lucide="external-link" size="12"></i>
                </a>
            </div>
            <div>
                <strong>Deployed Block:</strong><br>
                <span id="deployedBlock">#...</span>
            </div>
            <div>
                <strong>Sensors:</strong><br>
                <span id="sensorCount">... authorized sensor</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Constants
    const FACTORY_ADDRESS = '0x63bB41b79b5aAc6e98C7b35Dcb0fE941b85Ba5Bb';
    const STORE_ADDRESS = '0x0994Bc66b2863f8D58C8185b1ed6147895632812'; // Defaulting to FloodBoy016
    const UNIVERSAL_SIGNER = '0xcB0e58b011924e049ce4b4D62298Edf43dFF0BDd';
    const EXPLORER_URL = 'https://exp.jibchain.net';

    // ABIs
    const FactoryABI = [
        {
            "name": "getStoreInfo",
            "inputs": [{"name": "store", "type": "address"}],
            "outputs": [
                {"name": "nickname", "type": "string"},
                {"name": "owner", "type": "address"},
                {"name": "authorizedSensorCount", "type": "uint256"},
                {"name": "deployedBlock", "type": "uint128"},
                {"name": "description", "type": "string"}
            ],
            "stateMutability": "view",
            "type": "function"
        }
    ];

    const StoreABI = [
        {
            "name": "getAllFields",
            "outputs": [{
                "components": [
                    {"name": "name", "type": "string"},
                    {"name": "unit", "type": "string"},
                    {"name": "dtype", "type": "string"}
                ],
                "type": "tuple[]"
            }],
            "stateMutability": "view",
            "type": "function"
        },
        {
            "name": "getLatestRecord",
            "inputs": [{"name": "sensor", "type": "address"}],
            "outputs": [
                {"name": "timestamp", "type": "uint256"},
                {"name": "values", "type": "int256[]"}
            ],
            "stateMutability": "view",
            "type": "function"
        },
        {
            "name": "RecordStored",
            "inputs": [
                {"indexed": true, "name": "sensor", "type": "address"},
                {"indexed": false, "name": "timestamp", "type": "uint256"},
                {"indexed": false, "name": "values", "type": "int256[]"}
            ],
            "type": "event"
        }
    ];

    // State
    let chart = null;
    let historicalData = [];
    let activeMetric = 'waterDepth';
    let fieldConfigs = [];

    // Viem Client
    const jibchain = {
        id: 8899,
        name: 'JIBCHAIN L1',
        nativeCurrency: { name: 'JBC', symbol: 'JBC', decimals: 18 },
        rpcUrls: {
            default: { http: ['https://rpc-l1.jibchain.net'] }
        },
        blockExplorers: {
            default: { name: 'JIB Scan', url: EXPLORER_URL }
        }
    };

    const client = viem.createPublicClient({
        chain: jibchain,
        transport: viem.http()
    });

    // Formatting Utils
    function truncate(address) {
        return address.slice(0, 10) + '...' + address.slice(-6);
    }

    function formatTimestamp(ts) {
        return new Date(Number(ts) * 1000).toLocaleString('en-US', {
            month: '2-digit',
            day: '2-digit',
            year: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        });
    }

    function formatTimeOnly(ts) {
        return new Date(Number(ts) * 1000).toLocaleTimeString('en-US', {
            hour: 'numeric',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        });
    }

    function formatFieldName(name) {
        return name
            .split('_')
            .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
            .join(' ');
    }

    function processValue(value, unit, precision = null) {
        const baseUnit = unit.replace(/ x\d+/, '');
        let num = Number(value);
        
        if (unit.includes('x100')) {
            const val = num / 100;
            return val.toFixed(precision !== null ? precision : 3) + ' ' + baseUnit;
        }
        if (unit.includes('x1000')) {
            const val = num / 1000;
            return val.toFixed(precision !== null ? precision : 3) + ' ' + baseUnit;
        }
        if (unit.includes('x10000')) {
            const val = num / 10000;
            return val.toFixed(precision !== null ? precision : 4) + ' ' + baseUnit;
        }
        return value + ' ' + unit;
    }

    function getRawDivisor(unit) {
        if (unit.includes('x100')) return 100;
        if (unit.includes('x1000')) return 1000;
        if (unit.includes('x10000')) return 10000;
        return 1;
    }

    // App Logic
    async function init() {
        lucide.createIcons();
        try {
            document.getElementById('loading').style.display = 'flex';
            
            // 1. Fetch Metadata
            const [nickname, owner, sensorCount, deployedBlock, description] = await client.readContract({
                address: FACTORY_ADDRESS,
                abi: FactoryABI,
                functionName: 'getStoreInfo',
                args: [STORE_ADDRESS]
            });

            document.getElementById('storeNickname').innerText = nickname;
            document.getElementById('storeDescription').innerText = description;
            document.getElementById('deployedBlock').innerText = `#${deployedBlock}`;
            document.getElementById('sensorCount').innerText = `${sensorCount} authorized sensor`;
            document.getElementById('ownerTrunc').innerText = truncate(owner);
            document.getElementById('ownerLink').href = `${EXPLORER_URL}/address/${owner}`;
            document.getElementById('storeAddressTrunc').innerText = truncate(STORE_ADDRESS);
            document.getElementById('storeAddressLink').href = `${EXPLORER_URL}/address/${STORE_ADDRESS}`;

            // 2. Fetch Config & Latest
            fieldConfigs = await client.readContract({
                address: STORE_ADDRESS,
                abi: StoreABI,
                functionName: 'getAllFields'
            });

            const currentBlock = await client.getBlockNumber();
            document.getElementById('currentBlock').innerText = `Current Block: ${currentBlock}`;

            const [latestTs, latestValues] = await client.readContract({
                address: STORE_ADDRESS,
                abi: StoreABI,
                functionName: 'getLatestRecord',
                args: [UNIVERSAL_SIGNER]
            });

            document.getElementById('lastUpdated').innerText = `Last Updated: ${formatTimeOnly(latestTs)}`;
            
            // 3. Fetch History (Events)
            // Note: In real app, we handle pagination. Here we fetch last 2000 blocks for simplicity.
            const events = await client.getContractEvents({
                address: STORE_ADDRESS,
                abi: StoreABI,
                eventName: 'RecordStored',
                args: { sensor: UNIVERSAL_SIGNER },
                fromBlock: currentBlock - 2000n,
                toBlock: 'latest'
            });

            const waterIdx = fieldConfigs.findIndex(f => f.name.toLowerCase().includes('water_depth') && !f.name.includes('min') && !f.name.includes('max'));
            const voltIdx = fieldConfigs.findIndex(f => f.name.toLowerCase().includes('battery_voltage') && !f.name.includes('min') && !f.name.includes('max'));
            const waterCountIdx = fieldConfigs.findIndex(f => f.name.toLowerCase().includes('water_depth_count'));

            historicalData = events.map(e => ({
                ts: Number(e.args.timestamp),
                water: waterIdx >= 0 ? Number(e.args.values[waterIdx]) / 10000 : null,
                voltage: voltIdx >= 0 ? Number(e.args.values[voltIdx]) / 100 : null
            })).sort((a, b) => a.ts - b.ts);

            // 4. Update Table
            updateTable(latestValues, fieldConfigs);
            
            // 5. Render Chart
            renderChart();

            document.getElementById('loading').style.display = 'none';

        } catch (err) {
            console.error(err);
            const errBox = document.getElementById('errorBox');
            errBox.innerText = `Error: ${err.message}`;
            errBox.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    }

    function updateTable(values, configs) {
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = '';

        // Group fields
        const metrics = {};
        configs.forEach((config, i) => {
            const name = config.name.toLowerCase();
            let baseName = config.name;
            let type = 'current';

            if (name.includes('_min')) {
                baseName = config.name.replace('_min', '');
                type = 'min';
            } else if (name.includes('_max')) {
                baseName = config.name.replace('_max', '');
                type = 'max';
            } else if (name.includes('_count')) {
                baseName = config.name.replace('_count', '');
                type = 'count';
            }

            if (!metrics[baseName]) metrics[baseName] = { config };
            metrics[baseName][type] = values[i];
        });

        Object.keys(metrics).forEach(key => {
            const m = metrics[key];
            const name = formatFieldName(key);
            const unit = m.config.unit;
            
            let displayName = name;
            if (m.count !== undefined) {
                displayName = `${name} (${m.count} samples)`;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${displayName}</strong></td>
                <td>${processValue(m.current, unit)}</td>
                <td>${processValue(m.min !== undefined ? m.min : m.current, unit)}</td>
                <td>${processValue(m.max !== undefined ? m.max : m.current, unit)}</td>
            `;
            tbody.appendChild(row);
        });
    }

    function smoothData(data, windowSize = 3) {
        if (data.length < windowSize) return data;
        return data.map((val, i, arr) => {
            const start = Math.max(0, i - Math.floor(windowSize / 2));
            const end = Math.min(arr.length, start + windowSize);
            const slice = arr.slice(start, end).filter(v => v !== null);
            return slice.reduce((a, b) => a + b, 0) / slice.length;
        });
    }

    function renderChart() {
        const ctx = document.getElementById('sensorChart').getContext('2d');
        const isWater = activeMetric === 'waterDepth';
        
        if (chart) chart.destroy();
        
        if (historicalData.length === 0) {
            document.getElementById('noDataChart').style.display = 'flex';
            return;
        }

        const labels = historicalData.map(d => formatTimeOnly(d.ts));
        const rawValues = historicalData.map(d => isWater ? d.water : d.voltage);
        const smoothedValues = smoothData(rawValues);

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: isWater ? 'Water Depth (m)' : 'Battery Voltage (V)',
                    data: smoothedValues,
                    borderColor: isWater ? '#3B82F6' : '#10B981',
                    backgroundColor: isWater ? 'rgba(59, 130, 246, 0.1)' : 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: historicalData.length < 50 ? 3 : 0,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(isWater ? 4 : 3)}`
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }
                    },
                    y: {
                        beginAtZero: false,
                        title: {
                            display: true,
                            text: isWater ? 'Meters (m)' : 'Volts (V)'
                        }
                    }
                }
            }
        });
    }

    // Toggle Handlers
    document.getElementById('toggleWater').onclick = () => {
        activeMetric = 'waterDepth';
        document.getElementById('toggleWater').classList.add('active');
        document.getElementById('toggleVoltage').classList.remove('active');
        renderChart();
    };

    document.getElementById('toggleVoltage').onclick = () => {
        activeMetric = 'batteryVoltage';
        document.getElementById('toggleVoltage').classList.add('active');
        document.getElementById('toggleWater').classList.remove('active');
        renderChart();
    };

    init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dustboy Live Monitor - Cyber UI</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050b14;
            --card-bg: rgba(16, 24, 39, 0.7);
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --success: #00ff66;
            --danger: #ff003c;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(188, 19, 254, 0.05), transparent 25%);
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: auto; position: relative; z-index: 10;}

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(0, 243, 255, 0.2); 
            padding-bottom: 15px; margin-bottom: 30px; 
        }

        h2 { 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            letter-spacing: 2px;
            display: flex; align-items: center; gap: 10px;
        }

        .status-badge { 
            padding: 8px 16px; border-radius: 4px; font-size: 1rem; font-weight: bold;
            background: rgba(0, 255, 102, 0.1); 
            border: 1px solid var(--success);
            color: var(--success);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
            display: flex; align-items: center; gap: 8px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
        }

        .status-badge.disconnected {
            background: rgba(255, 0, 60, 0.1);
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.2);
        }

        .pulse {
            width: 10px; height: 10px; border-radius: 50%; background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse-animation 1.5s infinite;
        }

        .disconnected .pulse { background: var(--danger); box-shadow: 0 0 10px var(--danger); animation-duration: 0.5s; }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .card-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 8px; 
            padding: 20px; 
            border: 1px solid rgba(0, 243, 255, 0.1); 
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s ease-out forwards;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 243, 255, 0.5);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.15);
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
        }

        .card-header { 
            font-family: 'Orbitron', sans-serif;
            color: #fff; margin-bottom: 15px; font-size: 1.1rem; 
            border-bottom: 1px dashed rgba(255,255,255,0.1); 
            padding-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .station-id { color: var(--primary); font-weight: bold; letter-spacing: 1px; }

        .data-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        .data-item {
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px;
            display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .data-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .data-value { font-size: 1.2rem; color: var(--secondary); font-weight: bold; font-family: 'Orbitron', sans-serif; margin-top: 2px; word-break: break-all;}
        
        .data-item.pm25 .data-value { color: #facc15; }
        .data-item.temp .data-value { color: #ff6b6b; }
        .data-item.humid .data-value { color: #48dbfb; }

        .timestamp { 
            font-size: 0.8rem; color: var(--text-muted); 
            margin-top: 15px; text-align: right; font-family: monospace;
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        footer { 
            margin-top: 40px; text-align: center; color: var(--text-muted); 
            font-size: 0.9rem; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);
            font-family: 'Orbitron', sans-serif;
        }
        
        /* Scanline effect */
        body::after {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2><span style="font-size: 1.5rem;">🛰️</span> DUSTBOY NEON-LINK</h2>
        <div id="status" class="status-badge disconnected">
            <div class="pulse"></div>
            <span id="status-text">INITIALIZING...</span>
        </div>
    </header>

    <div id="monitor" class="card-grid">
        <!-- Data cards will be injected here -->
    </div>

    <footer>
        SYS.OP: <span style="color: var(--primary);">SOPHIA ORACLE 🌊</span> | PROTOCOL: MQTT-WSS
    </footer>
</div>

<script>
    const brokerUrl = 'wss://dustboy-wss-bridge.laris.workers.dev/mqtt';
    const topic = 'DUSTBOY/+/+/+/status';
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const monitorEl = document.getElementById('monitor');
    const stations = {}; 

    const client = mqtt.connect(brokerUrl);

    client.on('connect', () => {
        statusEl.className = 'status-badge';
        statusText.innerText = 'LINK ESTABLISHED';
        client.subscribe(topic);
    });

    client.on('message', (topic, message) => {
        try {
            const payload = JSON.parse(message.toString());
            const topicParts = topic.split('/');
            const stationId = topicParts[topicParts.length - 2]; 

            stations[stationId] = {
                id: stationId,
                data: payload,
                time: new Date().toLocaleTimeString('th-TH', { hour12: false }) + ' ⏱️'
            };

            updateUI();
        } catch (e) {
            console.error('Parse error:', e);
        }
    });

    function getHighlightClass(key) {
        key = key.toLowerCase();
        if (key.includes('pm2') || key.includes('pm25')) return 'pm25';
        if (key.includes('temp') || key.includes('tc')) return 'temp';
        if (key.includes('humid') || key.includes('hm')) return 'humid';
        return '';
    }

    function updateUI() {
        monitorEl.innerHTML = '';
        Object.values(stations).sort((a, b) => b.id.localeCompare(a.id)).forEach(station => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let dataHtml = '';
            for (const [key, value] of Object.entries(station.data)) {
                if(typeof value === 'object') continue; // Skip complex objects
                
                const highlight = getHighlightClass(key);
                dataHtml += `
                    <div class="data-item ${highlight}">
                        <span class="data-label">${key}</span>
                        <span class="data-value">${value}</span>
                    </div>`;
            }

            card.innerHTML = `
                <div class="card-header">
                    <span>STATION ID</span>
                    <span class="station-id">#${station.id}</span>
                </div>
                <div class="data-grid">
                    ${dataHtml}
                </div>
                <div class="timestamp">${station.time}</div>
            `;
            monitorEl.appendChild(card);
        });
    }

    client.on('error', (err) => {
        statusEl.className = 'status-badge disconnected';
        statusText.innerText = 'LINK LOST';
    });
</script>

</body>
</html>

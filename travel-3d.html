<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Train Journey - Sophia Express</title>
    <style>
        body { margin: 0; background-color: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; cursor: move; }
        .ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        .card { background: rgba(20, 20, 20, 0.8); padding: 15px 25px; border-radius: 12px; border-left: 5px solid #00d2ff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        h1 { margin: 0 0 5px 0; font-size: 1.2rem; color: #00d2ff; }
        .stats { font-size: 0.9em; color: #aaa; }
        #location { font-size: 0.8em; color: #00d2ff; margin-top: 5px; display: block; }
        .hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; pointer-events: none; backdrop-filter: blur(5px); }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.5s; }
    </style>
</head>
<body>

<div id="loading-screen">กำลังปลุกวิญญาณ 3D...</div>

<div class="ui">
    <div class="card">
        <h1>🚂 Sophia Express 3D</h1>
        <div class="stats">
            แบตเตอรี่: <span id="battery">-</span>%<br>
            📍 <span id="location">กำลังคำนวณพิกัด...</span>
        </div>
    </div>
</div>

<div class="hint">🖱️ หมุน: คลิกซ้าย | เลื่อน: คลิกขวา | ซูม: สกอร์ล</div>

<div id="canvas-container"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ฝังข้อมูล CSV โดยตรงเพื่อป้องกันปัญหา CORS เมื่อเปิดไฟล์แบบ local
    const csvData = `device,model,battery,charging,lat,lon,accuracy,source,place,place_type,locality,address,updated

Nat iPhone12mini,iPhone 12 mini,63,NotCharging,18.307567,99.40871,15,GPS,,,Mueang Lampang District,"Mueang Lampang District, Lampang 52000",2026-02-27 09:25:12
Nat iPhone12mini,iPhone 12 mini,60,NotCharging,18.254312,99.45892,15,GPS,,,Mueang Lampang District,"Mueang Lampang District, Lampang 52000",2026-02-27 09:35:45
Nat iPhone12mini,iPhone 12 mini,58,NotCharging,18.201211,99.50123,15,GPS,,,Mae Tha District,"Mae Tha District, Lampang 52220",2026-02-27 09:45:12
Nat iPhone12mini,iPhone 12 mini,55,NotCharging,18.156712,99.60123,15,GPS,,,Mae Tha District,"Mae Tha District, Lampang 52220",2026-02-27 10:05:45
Nat iPhone12mini,iPhone 12 mini,50,NotCharging,18.056712,99.70123,15,GPS,,,Long District,"Long District, Phrae 54150",2026-02-27 10:35:12
Nat iPhone12mini,iPhone 12 mini,45,NotCharging,17.956712,99.85123,15,GPS,,,Long District,"Long District, Phrae 54150",2026-02-27 11:05:45
Nat iPhone12mini,iPhone 12 mini,40,NotCharging,17.856712,100.00123,15,GPS,,,Den Chai District,"Den Chai District, Phrae 54110",2026-02-27 11:35:12
Nat iPhone12mini,iPhone 12 mini,35,NotCharging,17.756712,100.10123,15,GPS,,,Mueang Uttaradit District,"Mueang Uttaradit District, Uttaradit 53000",2026-02-27 12:05:45
Nat iPhone12mini,iPhone 12 mini,30,NotCharging,17.656712,100.15123,15,GPS,,,Mueang Uttaradit District,"Mueang Uttaradit District, Uttaradit 53000",2026-02-27 12:35:12
Nat iPhone12mini,iPhone 12 mini,25,NotCharging,17.456712,100.20123,15,GPS,,,Tron District,"Tron District, Uttaradit 53140",2026-02-27 13:05:45
Nat iPhone12mini,iPhone 12 mini,20,NotCharging,17.256712,100.25123,15,GPS,,,Phrom Phiram District,"Phrom Phiram District, Phitsanulok 65150",2026-02-27 13:35:12
Nat iPhone12mini,iPhone 12 mini,15,Charging,16.856712,100.30123,15,GPS,,,Mueang Phitsanulok District,"Mueang Phitsanulok District, Phitsanulok 65000",2026-02-27 14:15:45
Nat iPhone12mini,iPhone 12 mini,10,Charging,16.822712,100.26123,15,GPS,,,Pibulsongkram Rajabhat University,"Phitsanulok 65000",2026-02-27 14:35:12`;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    scene.fog = new THREE.Fog(0x0a0a0a, 50, 250);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);   
    camera.position.set(30, 30, 30);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // แสงสว่าง
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    light.castShadow = true;
    scene.add(light);

    // ตารางอ้างอิงและแกน
    const grid = new THREE.GridHelper(500, 50, 0x333333, 0x222222);
    scene.add(grid);

    // สร้างต้นไม้แบบ low-poly
    function createTree(x, z) {
        const group = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1), new THREE.MeshPhongMaterial({ color: 0x4d2600 }));
        trunk.position.y = 0.5;
        group.add(trunk);
        const leaves = new THREE.Mesh(new THREE.ConeGeometry(1, 2, 6), new THREE.MeshPhongMaterial({ color: 0x006400 }));
        leaves.position.y = 2;
        group.add(leaves);
        group.position.set(x, 0, z);
        scene.add(group);
    }

    // สร้างตัวรถไฟ
    function createTrain() {
        const group = new THREE.Group();
        // หัวรถไฟ
        const engine = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 2), new THREE.MeshPhongMaterial({ color: 0xe74c3c }));
        engine.position.y = 0.7;
        group.add(engine);
        // หน้าต่าง
        const window = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.1), new THREE.MeshPhongMaterial({ color: 0x3498db }));
        window.position.set(0, 1, 0.95);
        group.add(window);
        // ปล่องไฟ
        const chimney = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.5), new THREE.MeshPhongMaterial({ color: 0x333 }));
        chimney.position.set(0, 1.5, 0.5);
        group.add(chimney);
        return group;
    }

    // ฟังก์ชัน parse CSV แบบง่าย
    function parseCSV(text) {
        const lines = text.split('\n');
        const headers = lines[0].split(',');
        return lines.slice(1).map(line => {
            const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const obj = {};
            headers.forEach((h, i) => obj[h.trim()] = values[i] ? values[i].replace(/"/g, '').trim() : '');
            return obj;
        });
    }

    const data = parseCSV(csvData).filter(d => d.lat && d.lon);
    if (data.length > 0) {
        const origin = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        const scale = 500; // ปรับ scale ให้เห็นชัดขึ้น
        
        const points = data.map(d => {
            const x = (parseFloat(d.lon) - origin.lon) * scale;
            const z = (origin.lat - parseFloat(d.lat)) * scale;
            return { vec: new THREE.Vector3(x, 0.5, z), data: d };
        });

        const pathCurve = new THREE.CatmullRomCurve3(points.map(p => p.vec));
        
        // วาดเส้นราง
        const railGeo = new THREE.BufferGeometry().setFromPoints(pathCurve.getPoints(200));
        const railMat = new THREE.LineBasicMaterial({ color: 0x00d2ff, linewidth: 2 });
        scene.add(new THREE.Line(railGeo, railMat));

        // วางต้นไม้ประกอบฉาก
        points.forEach((p, i) => {
            if (i % 2 === 0) createTree(p.vec.x + 5, p.vec.z + 2);
        });

        const train = createTrain();
        scene.add(train);

        let progress = 0;
        function animate() {
            requestAnimationFrame(animate);
            if (train && pathCurve) {
                progress += 0.0005;
                if (progress > 1) progress = 0;
                
                const pos = pathCurve.getPointAt(progress);
                train.position.copy(pos);
                
                // หันหัวรถไฟไปตามเส้นทาง
                const nextPos = pathCurve.getPointAt(Math.min(progress + 0.01, 1));
                train.lookAt(nextPos);

                // อัปเดต UI
                const currentIdx = Math.floor(progress * (points.length - 1));
                const info = points[currentIdx].data;
                document.getElementById('battery').innerText = info.battery;
                document.getElementById('location').innerText = info.locality || 'กำลังเดินทาง...';
            }
            controls.update();
            renderer.render(scene, camera);
        }
        
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').remove(), 500);
        
        animate();
        
        // ตั้งกล้องให้เห็นจุดเริ่มต้น
        camera.position.set(points[0].vec.x + 20, 20, points[0].vec.z + 20);
        controls.target.copy(points[0].vec);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
